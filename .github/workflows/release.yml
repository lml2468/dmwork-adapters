name: 🚀 Release & Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    # Only run when commit message starts with "release:" or is a merge from develop
    if: startsWith(github.event.head_commit.message, 'release:') || startsWith(github.event.head_commit.message, 'Merge pull request')
    defaults:
      run:
        working-directory: openclaw-channel-dmwork

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: openclaw-channel-dmwork/package-lock.json

      - name: 📦 Install
        run: npm ci

      - name: 🔍 Type Check
        run: npx tsc --noEmit

      - name: 🧪 Test
        run: npm test

      - name: 🏗️ Build
        run: npm run build

      - name: 📋 Check version vs registry
        id: version-check
        run: |
          LOCAL_VER=$(node -p "require('./package.json').version")
          REMOTE_VER=$(npm view openclaw-channel-dmwork version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VER" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE_VER" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL_VER" = "$REMOTE_VER" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Version $LOCAL_VER already published, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "📦 Will publish $LOCAL_VER (registry has $REMOTE_VER)"
          fi

      - name: 🚀 Publish to npm
        if: steps.version-check.outputs.skip == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 🏷️ Create Git tag
        if: steps.version-check.outputs.skip == 'false'
        run: |
          VERSION=${{ steps.version-check.outputs.local }}
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: 📋 Collect changes
        if: steps.version-check.outputs.skip == 'false'
        id: changes
        run: |
          cd ..
          # Find previous version tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --oneline --pretty=format:"• %s" --no-merges | head -10 || echo "")
          else
            CHANGES=$(git log --oneline -10 --pretty=format:"• %s" --no-merges || echo "")
          fi
          CHANGES_ESCAPED=$(echo "$CHANGES" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
          echo "summary=$CHANGES_ESCAPED" >> "$GITHUB_OUTPUT"

      - name: 📢 Notify WeChat Work
        if: steps.version-check.outputs.skip == 'false' && success()
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          CHANGES="${{ steps.changes.outputs.summary }}"
          CHANGE_SECTION=""
          if [ -n "$CHANGES" ]; then
            CHANGE_SECTION="\n**变更内容汇总**\n${CHANGES}"
          fi
          curl -s -X POST "${{ secrets.WECHAT_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"🚀 **openclaw-channel-dmwork @latest 正式发布**\n**Pipeline:** #${{ github.run_number }} 成功\n**版本:** \`${{ steps.version-check.outputs.local }}\`\n**REV:** ${SHORT_SHA}\n**安装:** \`npm i openclaw-channel-dmwork\`${CHANGE_SECTION}\n\n[查看 CI](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }"
