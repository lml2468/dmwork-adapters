name: ✅ CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-channel-dmwork

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: openclaw-channel-dmwork/package-lock.json

      - name: 📦 Install
        run: npm ci

      - name: 🔍 Type Check
        run: npx tsc --noEmit

      - name: 🧪 Test
        run: npm test

      - name: 🏗️ Build
        run: npm run build

  publish-dev:
    name: Publish @dev
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    defaults:
      run:
        working-directory: openclaw-channel-dmwork

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: openclaw-channel-dmwork/package-lock.json

      - name: 📦 Install
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: 🏷️ Set dev version
        id: dev-version
        run: |
          BASE_VER=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          DEV_VER="${BASE_VER}-dev.${SHORT_SHA}"
          npm version "$DEV_VER" --no-git-tag-version
          echo "version=$DEV_VER" >> "$GITHUB_OUTPUT"
          echo "📦 Dev version: $DEV_VER"

      - name: 🚀 Publish to npm (dev tag)
        run: npm publish --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 📋 Collect changes
        id: changes
        run: |
          cd ..
          # Get merge commits (squash-merged PRs) from recent history
          CHANGES=$(git log --oneline --merges -10 --pretty=format:"%s" 2>/dev/null \
            | grep -oP '#\d+.*' | head -5 | sed 's/^/PR /' || true)
          if [ -z "$CHANGES" ]; then
            # Fallback: recent commit messages
            CHANGES=$(git log --oneline -5 --no-merges --pretty=format:"• %s" 2>/dev/null || echo "")
          fi
          # Escape for JSON
          CHANGES_ESCAPED=$(echo "$CHANGES" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
          echo "summary=$CHANGES_ESCAPED" >> "$GITHUB_OUTPUT"

      - name: 📢 Notify WeChat Work
        if: success()
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          CHANGES="${{ steps.changes.outputs.summary }}"
          CHANGE_SECTION=""
          if [ -n "$CHANGES" ]; then
            CHANGE_SECTION="\n**变更内容汇总**\n${CHANGES}"
          fi
          curl -s -X POST "${{ secrets.WECHAT_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"✅ **openclaw-channel-dmwork @dev 发布**\n**Pipeline:** #${{ github.run_number }} 成功\n**版本:** \`${{ steps.dev-version.outputs.version }}\`\n**REV:** ${SHORT_SHA}\n**安装:** \`npm i openclaw-channel-dmwork@dev\`${CHANGE_SECTION}\n\n[查看 CI](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }"
