name: 🐛 Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in as much detail as possible to help us diagnose the issue.
  - type: textarea
    id: summary
    attributes:
      label: Description
      description: Briefly describe the issue
      placeholder: Bot disconnects from WebSocket every 30 seconds
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List the steps to reproduce
      placeholder: |
        1. Configure dmwork channel plugin
        2. Run `openclaw gateway restart`
        3. Observe logs: WebSocket disconnects every 30s
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: WebSocket maintains a stable connection
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: Disconnects every 30s with ECONNRESET in logs
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Adapter Version
      placeholder: "0.2.18"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - OpenClaw Channel Plugin
        - Claude Code Adapter
        - Other
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 - Service Down / Data Loss
        - P1 - Core Feature Broken
        - P2 - Non-core Feature Issue
        - P3 - UX Issue
    validations:
      required: true
  - type: checkboxes
    id: reproducible
    attributes:
      label: Reproducibility
      options:
        - label: Consistently reproducible
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, OpenClaw version, DMWork server version, etc.
      placeholder: |
        - OS: macOS 15.3
        - Node.js: 22.x
        - OpenClaw: 2026.3.1
        - DMWork Server: v1.1.1
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Relevant logs, error messages, or screenshots (redact sensitive info)
    validations:
      required: false
