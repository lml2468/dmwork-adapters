name: 💡 Feature Request
description: Suggest a new feature
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! Please describe the problem and your proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem are you facing, or why do you need this feature?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to be solved?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches?
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - OpenClaw Channel Plugin
        - Claude Code Adapter
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Related links, issues, etc.
    validations:
      required: false
