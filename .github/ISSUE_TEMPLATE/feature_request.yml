name: 💡 Feature Request
description: 提出新功能建议
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述清楚需求背景和期望方案。
  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 你遇到了什么问题，或者为什么需要这个功能？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望怎么解决？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过其他方案吗？
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: 涉及组件
      options:
        - OpenClaw Channel Plugin
        - Claude Code Adapter
        - 其他
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 参考链接、相关 Issue 等
    validations:
      required: false
